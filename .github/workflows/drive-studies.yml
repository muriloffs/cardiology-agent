name: Daily Drive Studies

# 1x/dia, de manha cedo: puxa os PDFs novos da pasta "Para estudar" no Google
# Drive, gera os estudos e move o PDF para "Estudados" (renomeado). NAO e tempo
# real — voce larga PDFs na pasta quando quiser; isto recolhe uma vez por dia.

on:
  schedule:
    - cron: '30 8 * * *'   # 08:30 UTC = 05:30 America/Sao_Paulo
  workflow_dispatch:        # permite rodar manualmente quando quiser

concurrency:
  group: study-process      # compartilha trava com Process Study PDFs
  cancel-in-progress: false

jobs:
  pull-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --default-timeout=30 -r agent/requirements.txt

      - name: Pull from Drive and process
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STUDY_MODEL: ${{ vars.STUDY_MODEL || 'claude-opus-4-8' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_STUDY_FOLDER_ID: ${{ vars.DRIVE_STUDY_FOLDER_ID || '1fntK4txkOm6cuOEKPi_xsH8pNQo_1UUw' }}
          DRIVE_DONE_FOLDER_ID: ${{ vars.DRIVE_DONE_FOLDER_ID || '1XmWEP-u4zVzhZHMqhPjMHC6iP-zGdsAI' }}
        run: python -m agent.scripts.fetch_drive_studies

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit results
        run: |
          git add data/estudos study-inbox || true
          git commit -m "chore: estudos do Drive $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git pull --rebase origin main
          git push origin main
