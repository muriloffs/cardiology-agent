name: Daily Cardiology Research Report

on:
  schedule:
    # 3:00 AM Brasília time (UTC-3) = 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --default-timeout=30 -r agent/requirements.txt

      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python agent/scripts/generate_report.py

      - name: Verify report file created
        run: |
          REPORT_FILE=$(ls -t data/relatorio-*.json 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
            echo "✓ Report verified: $REPORT_FILE"
            ls -lah "$REPORT_FILE"
          else
            echo "✗ Report file not found in data/"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push report
        run: |
          REPORT_FILE=$(ls -t data/relatorio-*.json 2>/dev/null | head -1)
          if git diff --quiet "$REPORT_FILE" 2>/dev/null || ! git ls-files --error-unmatch "$REPORT_FILE" 2>/dev/null; then
            git add "$REPORT_FILE"
            git commit -m "chore: daily cardiology research report $(basename $REPORT_FILE .json | sed 's/relatorio-//')"
            git push origin main
          else
            echo "ℹ No changes to report file"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily report generation failed"
          exit 1
