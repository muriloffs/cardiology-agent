name: Daily Cardiology Research Report

on:
  schedule:
    # Scheduled at 3:00 UTC (midnight Brasília) so delivery lands at ~5 UTC = 2 AM Brasília.
    # 5 UTC is BEFORE Europe wakes up (Europe morning starts ~6 UTC) — quieter xAI window.
    # Must run AFTER 3 UTC to ensure Brasília "yesterday" calc includes full prior day.
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: true

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --default-timeout=30 -r agent/requirements.txt

      - name: Generate daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          WEBSHARE_PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
          GROK_MODEL: ${{ vars.GROK_MODEL || 'grok-4' }}
        run: python agent/scripts/generate_report.py

      - name: Verify report file created
        run: |
          REPORT_FILE=$(ls -t data/relatorio-*.json 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
            echo "✓ Report verified: $REPORT_FILE"
            ls -lah "$REPORT_FILE"
          else
            echo "✗ Report file not found in data/"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Update index and commit
        run: |
          REPORT_FILE=$(ls -t data/relatorio-*.json 2>/dev/null | head -1)
          ls data/relatorio-*.json 2>/dev/null \
            | sed 's|data/relatorio-||;s|\.json||' \
            | sort -r \
            | python3 -c "import sys,json; dates=[l.strip() for l in sys.stdin if l.strip()]; print(json.dumps({'dates':dates},indent=2))" \
            > data/index.json
          git add "$REPORT_FILE" data/index.json
          git commit -m "chore: daily cardiology research report $(basename $REPORT_FILE .json | sed 's/relatorio-//')" || echo "Nothing to commit"
          git pull --rebase origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily report generation failed"
          exit 1
