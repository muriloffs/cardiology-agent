name: Daily Cardiology Research Report

on:
  schedule:
    # DOIS crons (defesa em profundidade contra o scheduler do GitHub Actions
    # pular o disparo):
    #
    # 1) Primário: 07:17 UTC (4:17 BRT). Minuto 17 (não 0) reduz fila — GitHub
    #    documenta que minuto 0 sofre carga alta. Hora 7 UTC continua sendo a
    #    janela quieta entre pico asiático (~22 UTC) e europeu/americano (~14 UTC),
    #    importante para evitar 429 do Grok/xAI.
    #
    # 2) Backup: 09:17 UTC (6:17 BRT). Se o primário pular ou falhar, o backup
    #    pega o slot. Step "Check if report exists" abaixo impede duplicação:
    #    em eventos `schedule`, se o arquivo de hoje já existir, todos os steps
    #    seguintes viram no-op (sem custo de LLM). Em `workflow_dispatch` (botão
    #    manual), o check é ignorado — assumimos que o usuário quer re-run.
    - cron: '17 7 * * *'
    - cron: '17 9 * * *'
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: true

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Idempotência: em eventos `schedule`, pula o run se o relatório
      # "esperado" para hoje já existir no repo (gerado pelo cron primário
      # mais cedo, ou por um workflow_dispatch manual). Em `workflow_dispatch`
      # nunca pula — re-run manual é intencional.
      #
      # O nome do arquivo segue a convenção do script (agent.py:470):
      # "yesterday in Brasília timezone", então o expected_date para um run
      # de hoje (UTC) é "today em Brasília menos 1 dia".
      - name: Check if today's report already exists
        id: check_report
        run: |
          EXPECTED_DATE=$(TZ=America/Sao_Paulo date -d "1 day ago" +%Y-%m-%d)
          EXPECTED_FILE="data/relatorio-${EXPECTED_DATE}.json"
          echo "Expected: $EXPECTED_FILE"
          if [ -f "$EXPECTED_FILE" ]; then
            echo "✓ Report for $EXPECTED_DATE already exists. Skipping (event=${{ github.event_name }})."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "→ No report for $EXPECTED_DATE yet. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install --default-timeout=30 -r agent/requirements.txt

      - name: Generate daily report
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # YouTube Data API v3 requer chave SEPARADA da Gemini — Google Cloud
          # nao permite combinar Gemini API + YouTube Data API v3 na mesma key
          # com restricoes de API selecionadas. fetch_youtube_data_api.py prefere
          # YOUTUBE_API_KEY quando setada, com fallback para GOOGLE_API_KEY.
          # Chave criada no projeto gen-lang-client-0775181171 (2026-05-15).
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          WEBSHARE_PROXY_URL: ${{ secrets.WEBSHARE_PROXY_URL }}
          # grok-4 foi descontinuado em ~2026-05 — chamadas a esse modelo retornam
          # 429 cronicamente (capacidade zero, sem aviso). grok-4.3 é o drop-in
          # replacement oficial (mesmo preço $1.25/$2.50 por 1M tokens, mesmas rate
          # limits 10M TPM / 1.800 RPM). Para forçar outro modelo, basta criar uma
          # GitHub Variable chamada GROK_MODEL — sobrescreve este default.
          GROK_MODEL: ${{ vars.GROK_MODEL || 'grok-4.3' }}
          # Disable Gemini enrichment for YouTube videos.
          # Sem transcript real, sintese da descricao arrisca distorcer o conteudo.
          # Card mostra apenas: thumbnail, canal, titulo, descricao_preview (RSS literal).
          DISABLE_YT_ENRICHMENT: '1'
        run: python agent/scripts/generate_report.py

      - name: Verify report file created
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        run: |
          REPORT_FILE=$(ls -t data/relatorio-*.json 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ] && [ -f "$REPORT_FILE" ]; then
            echo "✓ Report verified: $REPORT_FILE"
            ls -lah "$REPORT_FILE"
          else
            echo "✗ Report file not found in data/"
            exit 1
          fi

      - name: Configure Git
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Update index and commit
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        run: |
          REPORT_FILE=$(ls -t data/relatorio-*.json 2>/dev/null | head -1)
          ls data/relatorio-*.json 2>/dev/null \
            | sed 's|data/relatorio-||;s|\.json||' \
            | sort -r \
            | python3 -c "import sys,json; dates=[l.strip() for l in sys.stdin if l.strip()]; print(json.dumps({'dates':dates},indent=2))" \
            > data/index.json
          git add "$REPORT_FILE" data/index.json
          git commit -m "chore: daily cardiology research report $(basename $REPORT_FILE .json | sed 's/relatorio-//')" || echo "Nothing to commit"
          git pull --rebase origin main
          git push origin main

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily report generation failed"
          exit 1
