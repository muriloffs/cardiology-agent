name: Process Study PDFs

on:
  push:
    paths:
      - 'study-inbox/**.pdf'
      # NAO disparar quando a ingestao do Drive (drive-studies.yml) so move PDFs
      # ja processados p/ a pasta processados/ — senao geraria um run no-op a toa.
      - '!study-inbox/processados/**'
  workflow_dispatch:

concurrency:
  group: study-process
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --default-timeout=30 -r agent/requirements.txt

      - name: Process study PDFs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STUDY_MODEL: ${{ vars.STUDY_MODEL || 'claude-opus-4-8' }}
        run: python -m agent.scripts.process_study

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit results
        run: |
          git add data/estudos study-inbox || true
          git commit -m "chore: processa estudos de study-inbox $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git pull --rebase origin main
          git push origin main
